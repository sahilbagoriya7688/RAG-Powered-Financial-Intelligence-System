# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — RAG-Powered Financial Intelligence System
#
# Usage:
#   docker-compose up --build          # build & start (foreground)
#   docker-compose up -d --build       # build & start (background)
#   docker-compose down                # stop and remove containers
#   docker-compose logs -f rag-api     # stream logs
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Main RAG API ────────────────────────────────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag-financial-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                          # copy .env.example -> .env and fill values
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_RELOAD=false              # disable reload in production
      - FAISS_INDEX_PATH=/app/faiss_index
      - UPLOAD_DIR=/app/uploaded_docs
    volumes:
      - faiss_data:/app/faiss_index   # persist FAISS index across restarts
      - upload_data:/app/uploaded_docs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - rag_network

  # ── Ollama (local LLM — optional, remove if using OpenAI) ──────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama     # persist downloaded models
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - rag_network
    # To pull a model after starting:
    #   docker exec rag-ollama ollama pull llama3

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  faiss_data:
    driver: local
  upload_data:
    driver: local
  ollama_data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  rag_network:
    driver: bridge
